name: Planning Board Monitor

on:
  schedule:
    - cron: "0 14 * * 1"   # Every Monday at 9am EST (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python monitor.py

      - name: Commit updated scraper state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for file in data/seen_links.json data/seen_docs.json data/dead_links.json; do
            if [ -f "$file" ]; then
              git add "$file"
            fi
          done

          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          git commit -m "chore: persist scraper dedupe state"
          git push origin HEAD:main
