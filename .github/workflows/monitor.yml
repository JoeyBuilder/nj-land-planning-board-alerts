name: Planning Board Monitor

on:
  schedule:
    - cron: "0 14 * * 1"   # Every Monday at 9am EST (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache state (seen links + downloaded PDFs)
        uses: actions/cache@v4
        with:
          path: data
          key: planning-board-monitor-state-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python monitor.py
